spring:
  application:
    name: fpa-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/cognologix_fpa
    username: fpa_user
    password: fpa_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32-chars}
    expiration-ms: 86400000   # 24 hours

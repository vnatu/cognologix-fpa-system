version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cognologix_fpa
      POSTGRES_USER: fpa_user
      POSTGRES_PASSWORD: fpa_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpa_user -d cognologix_fpa"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cognologix_fpa
      SPRING_DATASOURCE_USERNAME: fpa_user
      SPRING_DATASOURCE_PASSWORD: fpa_pass
      JWT_SECRET: dev-secret-change-in-production-must-be-32-chars-minimum
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
